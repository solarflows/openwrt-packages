	<script>
		//<![CDATA[
		var imgs = document.getElementsByTagName('img');
		for (var i = 0 ; i < imgs.length; i++) {
			document.getElementsByTagName('img')[i].setAttribute("oncontextmenu","return false;");
			document.getElementsByTagName('img')[i].setAttribute("ondragstart","return false;");
		}
		XHR.poll(5, '<%=api.url("index_status")%>', null,
			function (x, data) {
				var status_dns = document.getElementById('status_dns');
				var status_haproxy = document.getElementById('status_haproxy');
				if (data) {
					if (true) {
						var status_tcp_node = document.getElementById('status_tcp_node');
						if (status_tcp_node) {
							var text = 'TCP<br />';
							if (data["tcp_node_status"])
								text += '<span class="green"><%:RUNNING%></span>';
							else
								text += '<span class="red"><%:NOT RUNNING%></span>';
							status_tcp_node.innerHTML = text;
						}
					}

					if (true) {
						var status_udp_node = document.getElementById('status_udp_node');
						if (status_udp_node) {
							var text = 'UDP<br />';
							if (data["udp_node_status"])
								text += '<span class="green"><%:RUNNING%></span>';
							else
								text += '<span class="red"><%:NOT RUNNING%></span>';
							status_udp_node.innerHTML = text;
						}
					}

					if (data.dns_mode_status) {
						status_dns.innerHTML = 'DNS<br /><span class="green"><%:RUNNING%></span>';
					} else {
						status_dns.innerHTML = 'DNS<br /><span class="red"><%:NOT RUNNING%></span>';
					}
					if (status_haproxy) {
						if (data.haproxy_status === "-1") {
							status_haproxy.innerHTML = 'HAPROXY<br /><span class="red"><%:UNINSTALLED%></span>';
						} else if (data.haproxy_status === "0") {
							status_haproxy.innerHTML = 'HAPROXY<br /><span class="green"><%:RUNNING%></span>';
						} else {
							status_haproxy.innerHTML = 'HAPROXY<br /><span class="red"><%:NOT RUNNING%></span>';
						}
					}
				}
			});

		function check_ip_info() {
			var statusElement = document.getElementById('_ipinfo_status');
			var titleElement = document.getElementById('status_ipinfo');

			// 显示检查中状态
			statusElement.className = 'yellow';
			statusElement.innerHTML = '<%:Checking...%>';

			// 发送请求到新的ip_info接口
			XHR.get('<%=api.url("ip_info")%>', null,
				function(x, info) {
					if (x && x.status === 200) {
						try {
							var data = JSON.parse(x.responseText);
							if (data.ip && data.country) {
								statusElement.className = 'green';
								statusElement.innerHTML = data.ip + ' (' + data.country + ')';
							} else if (data.error) {
								statusElement.className = 'red';
								statusElement.innerHTML = data.error;
							} else {
								statusElement.className = 'red';
								statusElement.innerHTML = '<%:Unknown Error%>';
							}
						} catch(e) {
							statusElement.className = 'red';
							statusElement.innerHTML = '<%:Parse Error%>';
						}
					} else {
						statusElement.className = 'red';
						statusElement.innerHTML = '<%:Request Failed%>';
					}
				}
			);
		}

		function check_connect(type, url) {
			var s = document.getElementById('_' + type + '_status');
			if (s) {
				var div = s.parentNode.parentNode.parentNode.parentNode;
				div.removeAttribute('onclick');
				s.innerHTML = '<%:Check...%>';
				var sendDate = (new Date()).getTime();
				XHR.get('<%=api.url("connect_status")%>', {
						type: type,
						url : url
					},
					function(x, rv) {
						if (rv.ping_type && rv.ping_type == "curl") {
							var use_time = rv.use_time;
							if (use_time < 1000) {
								s.className="green";
							} else if (use_time < 2000) {
								s.className="yellow";
							} else {
								s.className="red";
							}
							s.innerHTML = use_time + " ms";
						} else if (rv.status) {
							s.className="green";
							s.innerHTML = "<%:Working...%>";
						}
						else {
							s.className="red";
							s.innerHTML = '<%:Problem detected!%>';
						}
						div.setAttribute('onclick','check_connect("' + type + '","' + url + '")');
					}
				);
			}
			return false;
		}
//]]>
	</script>
</fieldset>
